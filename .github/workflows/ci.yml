name: Trust Badger CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  # Job 1: Run all unit tests
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm test

  # Job 2: Full proxy integration test (the real proof)
  proxy-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install

      # Step 1: Run Trust Badger setup
      - name: Trust Badger Setup
        uses: ./
        id: badger
        with:
          mode: enforce

      # Step 2: Validate outputs
      - name: Validate setup outputs
        run: |
          echo "=== Trust Badger Setup Outputs ==="
          echo "Trust level: ${{ steps.badger.outputs.trust-level }}"
          echo "Disallowed tools: ${{ steps.badger.outputs.disallowed-tools }}"

          LEVEL="${{ steps.badger.outputs.trust-level }}"
          if [[ "$LEVEL" != "trusted" && "$LEVEL" != "contributor" && "$LEVEL" != "untrusted" ]]; then
            echo "FAIL: unexpected trust level: $LEVEL"
            exit 1
          fi
          echo "Trust level: OK"

          DISALLOWED="${{ steps.badger.outputs.disallowed-tools }}"
          if [[ "$DISALLOWED" != *"Bash"* ]]; then
            echo "FAIL: disallowed-tools should contain Bash"
            exit 1
          fi
          echo "Disallowed tools: OK"

          echo '${{ steps.badger.outputs.mcp-config }}' | python3 -m json.tool > /dev/null
          echo "MCP config JSON: OK"

          echo "All output validations PASSED"

      # Step 3: Test proxy via Node.js script (sends JSON-RPC over stdio)
      - name: Test proxy directly via JSON-RPC
        timeout-minutes: 3
        run: |
          echo "Hello from Trust Badger test" > test-fixture.txt

          # Write a Node script that spawns the proxy and tests it
          cat > /tmp/test-proxy.mjs << 'SCRIPT'
          import { spawn } from 'child_process';

          const mcpConfig = JSON.parse(process.argv[2]);
          const server = mcpConfig.mcpServers['trust-badger'];

          const proc = spawn(server.command, server.args, {
            env: { ...process.env, ...server.env },
            stdio: ['pipe', 'pipe', 'pipe'],
          });

          let stdout = '';
          let stderr = '';
          proc.stdout.on('data', d => { stdout += d.toString(); });
          proc.stderr.on('data', d => { stderr += d.toString(); });

          function send(msg) { proc.stdin.write(JSON.stringify(msg) + '\n'); }
          function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
          function getResponses() {
            return stdout.split('\n').filter(Boolean).map(l => { try { return JSON.parse(l); } catch(e) { return null; } }).filter(Boolean);
          }

          let pass = 0, fail = 0;
          function check(desc, condition) {
            if (condition) { console.log(`  PASS: ${desc}`); pass++; }
            else { console.log(`  FAIL: ${desc}`); fail++; }
          }

          // Test 1: Initialize
          send({ jsonrpc: '2.0', id: 1, method: 'initialize', params: {} });
          await sleep(1000);

          let resps = getResponses();
          check('Initialize response', resps.some(r => r.id === 1 && r.result?.serverInfo?.name === 'trust-badger'));

          // Test 2: tools/list
          send({ jsonrpc: '2.0', id: 2, method: 'tools/list', params: {} });
          await sleep(1000);

          resps = getResponses();
          const toolsList = resps.find(r => r.id === 2);
          check('tools/list returns tools', toolsList?.result?.tools?.length > 0);

          // Test 3: Read tool
          send({ jsonrpc: '2.0', id: 3, method: 'tools/call', params: { name: 'Read', arguments: { file_path: 'test-fixture.txt' } } });
          await sleep(2000);

          resps = getResponses();
          const readResp = resps.find(r => r.id === 3);
          check('Read tool returns file contents', readResp?.result?.content?.[0]?.text?.includes('Hello from Trust Badger'));

          // Print proxy decision log
          console.log('\n=== Proxy Decision Log ===');
          console.log(stderr);

          proc.kill();

          console.log(`\n=== Results: ${pass} passed, ${fail} failed ===`);
          process.exit(fail > 0 ? 1 : 0);
          SCRIPT

          node /tmp/test-proxy.mjs '${{ steps.badger.outputs.mcp-config }}'

  # Job 3: Claude integration (optional, may 402 with mock key)
  claude-integration:
    runs-on: ubuntu-latest
    continue-on-error: true
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Trust Badger Setup
        uses: ./
        id: badger
        with:
          mode: enforce

      - name: Claude Code Action
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: "Read the file test-fixture.txt and tell me what it says. Use the Read tool."
          claude_args: >
            --mcp-config '${{ steps.badger.outputs.mcp-config }}'
            --allowedTools 'mcp__trust-badger__*'
            --disallowedTools '${{ steps.badger.outputs.disallowed-tools }}'
