name: 'Trust Badger'
description: 'Context-aware runtime enforcement for AI agents in CI/CD'
branding:
  icon: 'shield'
  color: 'purple'

inputs:
  github-token:
    description: 'GitHub token for actor permission lookup'
    default: '${{ github.token }}'
  policy:
    description: 'Path to custom policy file (optional)'
    default: ''
  mode:
    description: 'enforce (block violations) or audit (log only)'
    default: 'audit'

outputs:
  trust-level:
    description: 'Detected trust level (trusted, contributor, untrusted)'
  violations:
    description: 'Number of blocked tool calls'
  mcp-config:
    description: 'MCP config JSON to pass to the agent'

runs:
  using: 'node20'
  main: 'dist/setup.js'
