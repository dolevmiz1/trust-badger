name: 'Trust Badger'
description: 'Context-aware runtime enforcement for AI agents in CI/CD'
branding:
  icon: 'shield'
  color: 'purple'

# Required permissions: contents:read, pull-requests:write (for PR comments)
# The github-token must have sufficient scope to check actor permissions.

inputs:
  github-token:
    description: 'GitHub token for actor permission lookup'
    default: '${{ github.token }}'
  policy:
    description: 'Path to custom policy file (optional)'
    default: ''
  mode:
    description: 'enforce (block violations) or audit (block + log without failing job)'
    default: 'audit'

outputs:
  trust-level:
    description: 'Detected trust level (trusted, contributor, untrusted)'
  violations:
    description: 'Number of blocked tool calls'
  mcp-config:
    description: 'MCP config JSON to pass to the agent via --mcp-config'
  disallowed-tools:
    description: 'Native tools to disable via --disallowedTools (prevents proxy bypass)'

runs:
  using: 'node20'
  main: 'dist/index.js'
